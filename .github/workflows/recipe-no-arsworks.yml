name: §25 recipe — no-arsworks reproduction

# §25 step 7 — slow no-arsworks CI gate.
#
# Two jobs, two runners, two R sessions:
#
#   1. build-bundle    — has arsworks loaded; produces a fresh T-DM-01
#                        bundle and uploads it as an artifact.
#   2. run-recipe-test — fresh runner with ONLY CRAN deps installed
#                        (dplyr, cards, tfrmt, gt, haven). Downloads the
#                        artifact, extracts it, runs the bundled
#                        Rscript T-DM-01_recreate_test.R, asserts exit 0.
#
# This catches the namespace-leak failure mode the fast smoke test in
# arstlf can't see — using the suite to test the no-suite script is a
# confidence trap. Running the ACTUAL bundled script in a session that
# doesn't have arsworks installed is the definitive guarantee.
#
# SUBMODULE AUTH NOTE: the default GITHUB_TOKEN scoped to this repo
# cannot clone sibling submodule repos in the OpenTrialReporting org
# (404s on `git submodule update --init`). We work around this by
# checking out each sub-package explicitly with actions/checkout@v6's
# `repository:` form — that path uses the standard auth flow and works
# for both public repos and private repos to which a configured PAT
# (set as the `SUBMODULES_PAT` secret) has access. If the secret is
# absent, the default GITHUB_TOKEN is used; that suffices for public
# repos but will 404 on private repos with a clear error message.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-bundle:
    name: Build T-DM-01 bundle (with arsworks)
    runs-on: ubuntu-latest
    steps:
      - name: Check out superproject (no submodules)
        uses: actions/checkout@v6

      - name: Check out arscore
        uses: actions/checkout@v6
        with:
          repository: OpenTrialReporting/arscore
          path: arscore
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Check out arsshells
        uses: actions/checkout@v6
        with:
          repository: OpenTrialReporting/arsshells
          path: arsshells
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Check out arsresult
        uses: actions/checkout@v6
        with:
          repository: OpenTrialReporting/arsresult
          path: arsresult
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Check out arstlf
        uses: actions/checkout@v6
        with:
          repository: OpenTrialReporting/arstlf
          path: arstlf
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Check out arsstudio
        uses: actions/checkout@v6
        with:
          repository: OpenTrialReporting/arsstudio
          path: arsstudio
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Check out ars
        uses: actions/checkout@v6
        with:
          repository: OpenTrialReporting/ars
          path: ars
          token: ${{ secrets.SUBMODULES_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      # The sub-packages gitignore NAMESPACE and man/*.Rd, so fresh
      # checkouts have no NAMESPACE files. R CMD INSTALL against a
      # package with no NAMESPACE produces a no-exports installation —
      # which then breaks downstream imports (e.g. ars @importFrom
      # arsshells browse_shells). Generate a fresh NAMESPACE in each
      # sub-package before pak installs it.
      #
      # Using roxygen2 directly (not devtools) keeps the dependency
      # chain tight — roxygen2 needs only cli/rlang/desc/glue/etc.,
      # whereas devtools transitively pulls in pkgdown→ragg→system
      # font libs that aren't installed on the runner yet.
      #
      # RENV_CONFIG_AUTOLOADER_ENABLED=FALSE bypasses the superproject
      # renv autoloader so install.packages() lands in the system
      # libpath, not the renv/library/ tree (which doesn't exist on a
      # fresh runner).
      - name: Pre-document sub-packages (regenerate gitignored NAMESPACE)
        env:
          RENV_CONFIG_AUTOLOADER_ENABLED: FALSE
        run: |
          Rscript -e '
            install.packages(
              c("roxygen2", "pkgload", "S7"),
              repos = "https://packagemanager.rstudio.com/all/__linux__/jammy/latest"
            )
            for (p in c("arscore", "arsshells", "arsresult",
                        "arstlf", "arsstudio", "ars")) {
              message("Documenting ", p)
              # Default load_code = "pkgload" — uses the just-installed
              # pkgload to load the source for tag introspection. Avoids
              # roxygen2 internal load_code = "source" which tries to
              # loadNamespace() a fake "roxygen_devtest" package and
              # fails on a fresh runner.
              roxygen2::roxygenise(p,
                                   roclets = c("collate", "namespace", "rd"))
            }
          '

      - name: Install build-time R deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Hard deps only (Imports + LinkingTo + Depends). Skipping
          # Suggests avoids pulling in chromium-via-chromote — the
          # pak resolver tries to `add-apt-repository ppa:xtradeb/apps`
          # for it, and that command hangs reaching launchpad.net on
          # the GitHub-hosted runners.  We only need to *build* the
          # bundle here; HTML-to-image rendering is unused.
          dependencies: '"hard"'
          extra-packages: |
            any::devtools
            any::dplyr
            any::tibble
            any::tidyr
            any::cards
            any::gt
            any::tfrmt
            any::S7
            any::reactable
            any::shiny
            any::bslib
            any::jsonlite
            any::cli
            any::rlang
            any::glue
          packages: |
            ./arscore
            ./arsshells
            ./arsresult
            ./arstlf
            ./arsstudio
            ./ars

      - name: Build T-DM-01 bundle
        run: Rscript scripts/build_test_bundle.R bundle

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: t-dm-01-bundle
          path: bundle/
          retention-days: 7

  run-recipe-test:
    name: Run §25 recipe in arsworks-free R
    needs: build-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      # Install ONLY the CRAN deps the recipe needs. Crucially: no
      # arsworks packages and no devtools — the test must fail loudly
      # if the recipe accidentally references one of them.
      - name: Install CRAN-only recipe deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::cards
            any::tfrmt
            any::gt
            any::haven

      - name: Confirm arsworks is NOT installed (negative check)
        run: |
          Rscript -e 'for (p in c("arscore","arsshells","arsresult","arstlf","arsstudio","ars")) {
                       if (requireNamespace(p, quietly = TRUE)) {
                         stop("CONFIDENCE TRAP: ", p, " is on the libpath; the no-arsworks contract is broken.")
                       }
                     }
                     cat("OK — none of the arsworks packages are installed.\n")'

      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: t-dm-01-bundle
          path: bundle

      - name: Run bundled recreate_test.R
        working-directory: bundle
        run: Rscript T-DM-01_recreate_test.R
