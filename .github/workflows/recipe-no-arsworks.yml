name: §25 recipe — no-arsworks reproduction

# §25 step 7 — slow no-arsworks CI gate.
#
# Two jobs, two runners, two R sessions:
#
#   1. build-bundle    — has arsworks loaded; produces a fresh T-DM-01
#                        bundle and uploads it as an artifact.
#   2. run-recipe-test — fresh runner with ONLY CRAN deps installed
#                        (dplyr, cards, tfrmt, gt, haven). Downloads the
#                        artifact, extracts it, runs the bundled
#                        Rscript T-DM-01_recreate_test.R, asserts exit 0.
#
# This catches the namespace-leak failure mode the fast smoke test in
# arstlf can't see — using the suite to test the no-suite script is a
# confidence trap. Running the ACTUAL bundled script in a session that
# doesn't have arsworks installed is the definitive guarantee.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-bundle:
    name: Build T-DM-01 bundle (with arsworks)
    runs-on: ubuntu-latest
    steps:
      - name: Check out superproject
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install build-time R deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::dplyr
            any::tibble
            any::tidyr
            any::cards
            any::gt
            any::tfrmt
            any::S7
            any::reactable
            any::shiny
            any::bslib
            any::jsonlite
            any::cli
            any::rlang
            any::glue
          packages: |
            ./arscore
            ./arsshells
            ./arsresult
            ./arstlf
            ./arsstudio
            ./ars

      - name: Build T-DM-01 bundle
        run: Rscript scripts/build_test_bundle.R bundle

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: t-dm-01-bundle
          path: bundle/
          retention-days: 7

  run-recipe-test:
    name: Run §25 recipe in arsworks-free R
    needs: build-bundle
    runs-on: ubuntu-latest
    steps:
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      # Install ONLY the CRAN deps the recipe needs. Crucially: no
      # arsworks packages and no devtools — the test must fail loudly
      # if the recipe accidentally references one of them.
      - name: Install CRAN-only recipe deps
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::dplyr
            any::cards
            any::tfrmt
            any::gt
            any::haven

      - name: Confirm arsworks is NOT installed (negative check)
        run: |
          Rscript -e 'for (p in c("arscore","arsshells","arsresult","arstlf","arsstudio","ars")) {
                       if (requireNamespace(p, quietly = TRUE)) {
                         stop("CONFIDENCE TRAP: ", p, " is on the libpath; the no-arsworks contract is broken.")
                       }
                     }
                     cat("OK — none of the arsworks packages are installed.\n")'

      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: t-dm-01-bundle
          path: bundle

      - name: Run bundled recreate_test.R
        working-directory: bundle
        run: Rscript T-DM-01_recreate_test.R
